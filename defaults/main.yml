--- 
# defaults file for ansible-linux-common

default_timezone: "Europe/Oslo"
default_hostname: "localhost"        # The hostname-value provided here will be replaced by the one defined in inventory if it matches the value
default_locale: "nb_NO.UTF-8"        # TODO: Locale has some bugs still in this role
install_extra_packages: false        # Default is false, most systems have no need of convenience-packages.
common_perform_pkg_upgrades: false   # Default is 'false', overrride with playbook
common_perform_pkg_autoremove: false # Default is 'false', overrride with playbook

#TODO: Leaving blank disables NTP configuration
ntp_time_servers: | # NOTE: This is ideally your own NTP service for your datacenter
  server 0.no.pool.ntp.org iburst
  server 1.no.pool.ntp.org iburst
  server 2.no.pool.ntp.org iburst
  server 3.no.pool.ntp.org iburst

packages:
  base:
    common:
      - dialog # Explanation: Too many packages expect 'dialog' or similar UI-component when displaying output
      - chrony # NTP
      - gpg
      - fail2ban #FIXME: Evaluate alternatives
      - tar
      - needrestart # Perl scripts to evaluate services that needs restarting
    rh_common:
      - python3-firewall
      - firewalld
    rhel:
      - epel-release #FIXME: Oracle Linux and Fedora
    debian:
      - acl
  tty:
    common:
      - screen
      - git # git-core on some systems?
    rh_common:
      - vim-enhanced
    debian:
      - vim
    extra:
      - mlocate
      - lsof
      - pciutils
      - unzip
      - ccze
      - bind-utils
